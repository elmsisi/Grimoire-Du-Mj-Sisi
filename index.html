<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire de Campagne</title>
    <style>
        :root {
            --bg-primary: #1a142e;
            --bg-secondary: #2d2345;
            --text-primary: #f8f6ff;
            --text-secondary: #b8b0c8;
            --accent-gold: #ffd700;
            --accent-purple: #9d4edd;
            --border-color: #4a3e5c;
            --card-bg: #251f38;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Georgia', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a142e 100%);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--accent-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--accent-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        #global-search {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        /* Main layout */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar navigation */
        aside {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 1rem 0.5rem;
            overflow-y: auto;
        }

        .nav-category {
            margin-bottom: 1rem;
        }

        .nav-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--accent-purple);
            padding: 0.4rem 1rem;
            border-left: 3px solid var(--accent-gold);
            background: rgba(255,215,0,0.1);
        }

        .nav-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.6rem 1rem;
            margin-bottom: 0.3rem;
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .nav-item:hover {
            background: var(--accent-purple);
            color: white;
            transform: translateX(4px);
        }

        .nav-item.active {
            background: var(--accent-gold);
            color: #1a142e;
            font-weight: bold;
        }

        /* Content area */
        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }

        .content-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.6rem;
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        h3 {
            font-size: 1.2rem;
            color: var(--accent-purple);
            margin: 1.5rem 0 1rem;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .card-title {
            font-weight: bold;
            color: var(--accent-gold);
        }

        /* Loot tables */
        .loot-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .loot-table th, .loot-table td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .loot-table th {
            background: rgba(255,215,0,0.15);
            color: var(--accent-gold);
            font-weight: bold;
        }

        /* Auto loot generator */
        .auto-loot-form {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
            padding: 1.2rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        .form-group {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        select, input[type="number"] {
            padding: 0.6rem;
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        button {
            padding: 0.7rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent-purple);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(157,78,221,0.4);
        }

        /* Tags */
        .tags-container {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }

        .tag {
            padding: 0.35rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(157,78,221,0.2);
            color: var(--accent-purple);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag:hover {
            background: var(--accent-purple);
            color: white;
        }

        /* Notes area */
        .notes-area {
            min-height: 150px;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            margin-top: 1rem;
        }

        .note-input {
            width: 100%;
            min-height: 100px;
            padding: 0.8rem;
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            font-family: inherit;
        }

        /* Favorites */
        .fav-icon {
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 50%;
            background: rgba(255,215,0,0.1);
            color: var(--accent-gold);
            transition: all 0.2s ease;
        }

        .fav-icon:hover {
            background: var(--accent-gold);
            color: #1a142e;
        }

        /* Footer */
        footer {
            padding: 1rem 2rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            aside { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            header h1 { font-size: 1.4rem; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-purple); }
    </style>
</head>
<body>

<header>
    <h1>📖 Grimoire de Campagne</h1>
    <div class="search-container">
        <input type="text" id="global-search" placeholder="Rechercher dans tout le grimoire...">
    </div>
</header>

<div class="main-container">
    <aside id="sidebar-nav"></aside>

    <main id="content-area"></main>
</div>

<footer>
    <p>Grimoire de Campagne v1.0 — Créé par Qwythos (Empero AI) | Données sauvegardées dans votre navigateur</p>
</footer>

<script>
// ==================== DONNÉES INITIALES ====================
const initialData = {
    categories: [
        { id: 'regles', name: '📜 Règles générales (Joueur)', icon: '📜' },
        { id: 'univers', name: '🌍 Univers & Lore', icon: '🌍' },
        { id: 'roleplay', name: '💬 Explications Roleplay', icon: '💬' },
        { id: 'loot', name: '⚔️ Loot possible', icon: '⚔️' },
        { id: 'mini-jeux', name: '🎲 Mini-jeux & Spécificités', icon: '🎲' },
        { id: 'items', name: '💎 Items', icon: '💎' },

        { id: 'feuilles-perso', name: '👤 Feuilles perso', icon: '👤' }

    lootTables: {
        'loot': [
            { d20: 1, d100: 1, item: "Lantern of Revealing" },
            { d20: 2, d100: 2, item: "Dague magique faible (dmg+1)" },
            { d20: 3, d100: 3, item: "Potion de guérison mineure" },
            { d20: 4, d100: 4, item: "Épée rustique +1" },
            { d20: 5, d100: 5, item: "Anneau de protection (AC+1)" },
            { d20: 6, d100: 6, item: "Livre ancien (connaissance)" },
            { d20: 7, d100: 7, item: "Bouclier en bois" },
            { d20: 8, d100: 8, item: "Potion de force (+STR)" },
            { d20: 9, d100: 9, item: "Épée courante +1" },
            { d20: 10, d100: 10, item: "Anneau de feu (dmg+1)" },
            { d20: 11, d100: 11, item: "Livre de magie élémentaire" },
            { d20: 12, d100: 12, item: "Bouclier en métal +1" },
            { d20: 13, d100: 13, item: "Potion de sagesse (+WIS)" },
            { d20: 14, d100: 14, item: "Épée magique +2" },
            { d20: 15, d100: 15, item: "Anneau de vie (HP+10)" },
            { d20: 16, d100: 16, item: "Livre de nécromancie" },
            { d20: 17, d100: 17, item: "Bouclier enchanté +2" },
            { d20: 18, d100: 18, item: "Potion de vitesse (+DEX)" },
            { d20: 19, d100: 19, item: "Épée légendaire +3" },
            { d20: 20, d100: 20, item: "Anneau de puissance (dmg+2)" }
        ],

        'loot-enemies': [
            { type: 'Humanoid', items: ["Épée rustique", "Potion mineure", "Livre ancien"] },
            { type: 'Undead', items: ["Anneau de protection", "Bouclier en bois", "Livre de magie sombre"] },
            { type: 'Giant', items: ["Bouclier lourd +1", "Potion de force majeure", "Épée lourde +2"] },
            { type: 'Beast', items: ["Dague sauvage", "Potion d'agilité", "Livre de nature"] },
            { type: 'Dragon', items: ["Anneau de feu", "Bouclier dragonné +3", "Épée légendaire +4"] }
        ]
    },

    lootLocations: [
        { name: "Coffre donjon", d20: true, d100: true },
        { name: "Baril étrange", d20: true, d100: false },
        { name: "Pêche dans un marais", d20: true, d100: false },
        { name: "Camp de pillards", d20: true, d100: true },
        { name: "Bibliothèque abandonnée", d20: false, d100: true }
    ],

    notes: {}, // { [id]: { title, content, tags, fav } }
    favorites: [], // [ids]
    bookmarks: {} // { [category]: [itemIds] }
};

// ==================== STATE ====================
let state = { ...initialData };
const STORAGE_KEY = 'qwythos_grimoire_v1';

function loadFromStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        const parsed = JSON.parse(saved);
        Object.assign(state, parsed);
    }
}

function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ==================== RENDER SIDEBAR ====================
function renderSidebar() {
    const sidebar = document.getElementById('sidebar-nav');
    sidebar.innerHTML = state.categories.map(cat => `
        <div class="nav-category">
            <div class="nav-title">${cat.icon} ${cat.name}</div>
            <button class="nav-item" data-cat="${cat.id}" onclick="navigateTo('${cat.id}')">
                Voir la catégorie
            </button>
        </div>
    `).join('');

    // Add auto-loot generator button in loot section
    const lootCat = state.categories.find(c => c.id === 'loot');
    if (lootCat) {
        const btn = document.createElement('button');
        btn.className = 'nav-item';
        btn.style.marginTop = '0.5rem';
        btn.textContent = '🎲 Générateur de loot rapide';
        btn.onclick = () => showAutoLootForm();
        sidebar.appendChild(btn);
    }

    // Add bookmarks section at end
    const bookBtn = document.createElement('button');
    bookBtn.className = 'nav-item';
    bookBtn.textContent = '🔖 Favoris / Marque-pages';
    bookBtn.onclick = () => showBookmarks();
    sidebar.appendChild(bookBtn);
}

// ==================== NAVIGATION ====================
function navigateTo(catId) {
    const cat = state.categories.find(c => c.id === catId);
    if (!cat) return;

    // Update active nav item
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event.target.closest('.nav-item')?.classList.add('active');

    renderContent(cat);
}

function renderContent(category) {
    const main = document.getElementById('content-area');
    
    switch (category.id) {
        case 'regles':
            main.innerHTML = `
                <h2>📜 Règles générales</h2>
                <div class="card">
                    <div class="card-header"><span class="card-title">Introduction aux règles de base</span></div>
                    <p>Voici les règles fondamentales que tous les joueurs doivent connaître avant de commencer une partie.</p>
                    <ul style="margin-top:0.8rem; padding-left:1.5rem;">
                        <li>Jets de dés : d20 + modificateur vs DC</li>
                        <li>Classement des compétences : Force, Dextérité, Constitution, Intelligence, Sagesse, Charisme</li>
                        <li>Types de jets : Attaque, Sauvetage, Compétence</li>
                    </ul>
                </div>
            `;
            break;

        case 'univers':
            main.innerHTML = `
                <h2>🌍 Univers & Lore</h2>
                <div class="card">
                    <div class="card-header"><span class="card-title">Histoire du monde</span></div>
                    <p>Découvrez l'histoire de notre campagne, les royaumes, les factions et les événements majeurs.</p>
                    <h3 style="margin-top:1.2rem;">Royaumes principaux</h3>
                    <ul style="padding-left:1.5rem; margin-top:0.6rem;">
                        <li><strong>Royauté de Solara</strong> — Capitale : Cité d'Or</li>
                        <li><strong>Duché des Forêts Ombreuses</strong> — Chef-lieu : Bois Éternel</li>
                        <li><strong>Empire du Désert</strong> — Centre : Oasis de la Lune</li>
                    </ul>
                </div>
            `;
            break;

        case 'roleplay':
            main.innerHTML = `
                <h2>💬 Explications Roleplay</h2>
                <div class="card">
                    <p>Ce guide explique comment jouer de manière immersive : dialogues, actions sociales, gestion de la réputation, etc.</p>
                </div>
            `;
            break;

        case 'loot':
            main.innerHTML = `
                <h2>⚔️ Loot possible</h2>
                
                <div class="card">
                    <div class="card-header"><span class="card-title">Tables de loot (d20 / d100)</span></div>
                    
                    <table class="loot-table">
                        <thead><tr><th>d20</th><th>d100</th><th>Objet trouvé</th></tr></thead>
                        <tbody>${state.lootTables['loot'].map((row, i) => `
                            <tr>
                                <td>${row.d20}</td>
                                <td>${row.d100}</td>
                                <td>${row.item}</td>
                            </tr>`).join('')}</tbody>
                    </table>

                    <div class="auto-loot-form">
                        <h3 style="margin-top:1.2rem;">🎲 Générateur de loot rapide</h3>
                        <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:0.6rem;">Choisissez un lieu, lancez le dé, et obtenez du loot instantanément.</p>
                        
                        <div class="form-group">
                            <select id="auto-loot-location" onchange="updateAutoLootForm()">
                                ${state.lootLocations.map(loc => `<option value="${loc.name}">${loc.name}</option>`).join('')}
                            </select>
                            
                            <select id="auto-loot-die-type">
                                <option value="d20">Dés 20</option>
                                <option value="d100">Dés 100</option>
                            </select>
                            
                            <input type="number" id="auto-loot-roll" placeholder="Résultat du dé (ex: 15)" min="1" max="${state.lootTables['loot'][state.lootTables['loot'].length-1].d20}">
                        </div>

                        <button class="btn-primary" onclick="generateAutoLoot()">🎲 Générer le loot</button>
                        
                        <div id="auto-loot-result" style="margin-top:1rem; padding:0.8rem; background:rgba(255,215,0,0.1); border-radius:6px;"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><span class="card-title">Loot par type d'ennemi</span></div>
                    <table class="loot-table">
                        <thead><tr><th>Type d'ennemi</th><th>Loot possible</th></tr></thead>
                        <tbody>${state.lootTables['loot-enemies'].map(row => `
                            <tr>
                                <td style="font-weight:bold;">${row.type}</td>
                                <td>${row.items.join(', ')}</td>
                            </tr>`).join('')}</tbody>
                    </table>
                </div>

                <div class="card">
                    <h3 style="margin-top:1.2rem;">📝 Notes personnelles sur le loot</h3>
                    <textarea id="loot-notes" class="note-input" placeholder="Ajoutez vos notes ici (ex: 'Coffre du niveau 5 contient souvent des potions...')"></textarea>
                    <div class="tags-container" id="loot-tags"></div>
                </div>

                <div class="card">
                    <h3 style="margin-top:1.2rem;">🔖 Favoris</h3>
                    <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:0.6rem;">Marquez certains objets comme favoris pour y accéder rapidement.</p>
                    <div id="loot-favs-list"></div>

        case 'mini-jeux':

                <h2>🎲 Mini-jeux & Spécificités</h2>
                <div class="card">
                    <p>Liste des mini-jeux utilisables en session : énigmes, jeux de rôle improvisés, etc.</p>
                </div>
            `;
            break;

        case 'items':
            main.innerHTML = `
                <h2>💎 Items</h2>
                <div class="card">
                    <p>Catalogue des objets magiques et non-magiques disponibles dans la campagne.</p>
                </div>
            `;
            break;

        case 'npcs':
            main.innerHTML = `
                <h2>👤 NPCs</h2>
                
                <div class="card">
                    <div class="card-header"><span class="card-title">NPC : ${state.notes['npc1']?.title || 'Inconnu'}</span></div>
                    
                    <p><strong>Nom :</strong> ${state.notes['npc1']?.content.split('\n')[0] || ''}</p>
                    <p><strong>Description :</strong> ${state.notes['npc1']?.content.split('\n').slice(1).join(' ') || ''}</p>
                    
                    <div class="tags-container" id="npc-tags"></div>

                    <textarea id="npc-notes" class="note-input" placeholder="Ajoutez des notes sur cet NPC..."></textarea>
                </div>

                <div class="card">
                    <h3 style="margin-top:1.2rem;">🔖 Favoris</h3>
                    <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:0.6rem;">Marquez cet NPC comme favori.</p>
                    <button class="btn-primary" onclick="toggleFavorite('npc1')">⭐ Marquer/démarquer comme favori</button>
                </div>
            `;
            break;

        case 'cartes-scenes':
            main.innerHTML = `
                <h2>🗺️ Cartes & Scènes</h2>
                <div class="card">
                    <p>Description des lieux clés de la campagne avec leurs points d'intérêt.</p>
                </div>
            `;
            break;

        case 'notes-sessions':
            main.innerHTML = `
                <h2>📝 Notes de session</h2>
                
                <div class="card">
                    <div class="card-header"><span class="card-title">Session #1 — Introduction</span></div>
                    
                    <p><strong>Date :</strong> ${state.notes['session1']?.content.split('\n')[0] || ''}</p>
                    <p><strong>Résumé :</strong> ${state.notes['session1']?.content.split('\n').slice(1).join(' ') || ''}</p>
                    
                    <div class="tags-container" id="session-tags"></div>

                    <textarea id="session-notes" class="note-input" placeholder="Ajoutez des notes pour cette session..."></textarea>
                </div>

                <div class="card">
                    <h3 style="margin-top:1.2rem;">🔖 Favoris</h3>
                    <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:0.6rem;">Marquez cette note comme favorite.</p>
                    <button class="btn-primary" onclick="toggleFavorite('session1')">⭐ Marquer/démarquer comme favori</button>
                </div>
            `;
            break;

        case 'feuilles-perso':
            main.innerHTML = `
                <h2>👤 Feuilles perso</h2>
                
                <div class="card">
                    <div class="card-header"><span class="card-title">Personnage : ${state.notes['perso1']?.title || 'Inconnu'}</span></div>
                    
                    <p><strong>Nom :</strong> ${state.notes['perso1']?.content.split('\n')[0] || ''}</p>
                    <p><strong>Race/Classe :</strong> ${state.notes['perso1']?.content.split('\n').slice(1).join(' ') || ''}</p>
                    
                    <div class="tags-container" id="perso-tags"></div>

                    <textarea id="perso-notes" class="note-input" placeholder="Ajoutez des notes sur ce personnage..."></textarea>
                </div>

                <div class="card">
                    <h3 style="margin-top:1.2rem;">🔖 Favoris</h3>
                    <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:0.6rem;">Marquez ce personnage comme favori.</p>
                    <button class="btn-primary" onclick="toggleFavorite('perso1')">⭐ Marquer/démarquer comme favori</button>
                </div>
            `;
            break;

        default:
            main.innerHTML = `<h2>${category.name}</h2><p>Contenu à venir...</p>`;
    }
}

// ==================== AUTO LOOT GENERATOR ====================
function updateAutoLootForm() {
    const location = document.getElementById('auto-loot-location').value;
    const locData = state.lootLocations.find(l => l.name === location);
    
    // Update max roll based on d20/d100 availability
    const dieType = document.getElementById('auto-loot-die-type');
    if (locData.d20) {
        dieType.max = 20;
        dieType.value = 'd20';
    } else {
        dieType.max = 100;
        dieType.value = 'd100';
    }
}

function generateAutoLoot() {
    const location = document.getElementById('auto-loot-location').value;
    const dieType = document.getElementById('auto-loot-die-type').value;
    let rollValue = parseInt(document.getElementById('auto-loot-roll').value) || 0;

    // If no roll provided, simulate a random roll
    if (rollValue === 0) {
        rollValue = Math.floor(Math.random() * 20) + 1;
        document.getElementById('auto-loot-roll').value = rollValue;
    }

    const resultDiv = document.getElementById('auto-loot-result');
    
    // Find loot table for this location (simplified: use main loot table)
    let item = null;
    if (dieType === 'd20') {
        const row = state.lootTables['loot'].find(r => r.d20 === rollValue);
        item = row ? row.item : 'Objet inconnu';
    } else {
        const row = state.lootTables['loot'].find(r => r.d100 === rollValue);
        item = row ? row.item : 'Objet rare (d100)';
    }

    resultDiv.innerHTML = `
        <strong>🎲 Lieu :</strong> ${location} | 
        <strong>Dé :</strong> ${dieType} (${rollValue}) → 
        <strong>Loot obtenu :</strong> <span style="color:var(--accent-gold); font-weight:bold;">${item}</span>
    `;

    // Save this loot entry to notes for persistence
    if (!state.notes['auto-loot']) state.notes['auto-loot'] = { title: 'Loot généré automatiquement', content: '', tags: [] };
    const autoNotes = state.notes['auto-loot'];
    autoNotes.content += `\n\n${new Date().toLocaleDateString()} — ${location} (d${dieType === 'd20' ? '20' : '100'}=${rollValue}) → ${item}\n`;
    saveToStorage();
}

function toggleFavorite(id) {
    if (state.favorites.includes(id)) {
        state.favorites = state.favorites.filter(fid => fid !== id);
    } else {
        state.favorites.push(id);
    }
    saveToStorage();
    renderSidebar(); // refresh nav to show fav icons
}

function toggleFavoriteFromSelect() {
    const select = document.getElementById('fav-select');
    if (select.value) {
        toggleFavorite(select.value);
        select.value = '';

}

function removeFavorite(id) {
    state.favorites = state.favorites.filter(fid => fid !== id);
    saveToStorage();
    showBookmarks(); // refresh view
}

function addBookmark() {
    const catId = document.getElementById('bookmark-cat-select').value;
    const title = document.getElementById('bookmark-title-input').value.trim();
    const content = document.getElementById('bookmark-content-input').value.trim();

    if (!title) return alert('Veuillez entrer un titre.');

    // Create a new note entry for this bookmark
    const id = `bm_${Date.now()}`;
    state.notes[id] = { title, content, tags: [], fav: false };
    
    // Add to bookmarks list for that category
    if (!state.bookmarks[catId]) state.bookmarks[catId] = [];
    state.bookmarks[catId].push(id);

    saveToStorage();
    showBookmarks(); // refresh view
}

// ==================== TAGS SYSTEM ====================
function renderTags(containerId, noteId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    const note = state.notes[noteId];
    if (!note) {
        container.innerHTML = '';
        return;
    }

    // Render existing tags
    container.innerHTML = note.tags.map(tag => `
        <span class="tag" onclick="removeTag('${noteId}', '${tag}')">${tag}</span>
    `).join('');

    // Add new tag input
    const inputDiv = document.createElement('div');
    inputDiv.style.marginTop = '0.6rem';
    inputDiv.innerHTML = `
        <input type="text" id="${containerId}-tag-input" placeholder="+ Ajouter un tag..." style="padding:0.4rem; border-radius:4px; border:1px solid var(--border-color); background:var(--bg-secondary); color:var(--text-primary);">
        <button class="btn-primary" onclick="addTag('${noteId}')" style="font-size:0.85rem; padding:0.4rem 0.7rem;">+</button>
    `;
    container.appendChild(inputDiv);
}

function addTag(noteId) {
    const input = document.getElementById(`${noteId}-tag-input`);
    if (!input || !input.value.trim()) return;

    const tag = input.value.trim();
    const note = state.notes[noteId];
    
    // Avoid duplicates
    if (note.tags.includes(tag)) return alert('Ce tag existe déjà.');

    note.tags.push(tag);
    saveToStorage();
    renderTags(`${noteId}-tags`, noteId);
}

function removeTag(noteId, tag) {
    const note = state.notes[noteId];
    if (!note) return;

    note.tags = note.tags.filter(t => t !== tag);
    saveToStorage();
    renderTags(`${noteId}-tags`, noteId);
}

// ==================== SEARCH FUNCTIONALITY ====================
function performSearch(query) {
    const main = document.getElementById('content-area');
    
    if (!query.trim()) {
        // No search — show current category content
        return;
    }

    const lowerQuery = query.toLowerCase();
    
    // Search across all notes
    let matches = [];
    Object.values(state.notes).forEach(note => {
        if (note.title.toLowerCase().includes(lowerQuery) || 
            note.content.toLowerCase().includes(lowerQuery) ||
            note.tags.some(t => t.toLowerCase().includes(lowerQuery))) {
            matches.push({ id: note.id, title: note.title, content: note.content });
        }
    });

    // Also search categories (simple text match on name)
    state.categories.forEach(cat => {
        if (cat.name.toLowerCase().includes(lowerQuery)) {
            matches.push({ id: cat.id, title: cat.name, content: '' });
        }
    });

    // Sort by relevance (title first, then content, then tags)
    matches.sort((a, b) => {
        const aScore = a.title.includes(lowerQuery) ? 3 : 0 + a.content.includes(lowerQuery) ? 2 : 0;
        const bScore = b.title.includes(lowerQuery) ? 3 : 0 + b.content.includes(lowerQuery) ? 2 : 0;
        return bScore - aScore;
    });

    if (matches.length === 0) {
        main.innerHTML = `<h2>Recherche</h2><p style="color:var(--text-secondary);">Aucun résultat trouvé pour «${query}».</p>`;
        return;
    }

    // Render search results as cards with quick navigation
    main.innerHTML = `
        <h2>🔍 Résultats de la recherche («${query}»)</h2>
        
        ${matches.map((m, i) => {
            const isCategory = state.categories.find(c => c.id === m.id);
            return `
                <div class="card" style="${isCategory ? 'border-left:4px solid var(--accent-gold);' : ''}">
                    <h3 style="color:${isCategory ? 'var(--accent-gold)' : 'inherit'};">${i+1}. ${m.title}</h3>
                    
                    ${!isCategory && m.content ? `<p>${m.content.substring(0, 250)}${m.content.length > 250 ? '...' : ''}</p>` : ''}
                    
                    <div style="margin-top:0.8rem;">
                        <button class="btn-primary" onclick="navigateTo('${m.id}')">👁️ Ouvrir</button>
                        
                        ${!isCategory && m.tags.length > 0 ? `
                            <span class="tags-container">${m.tags.map(t => `<span class="tag">${t}</span>`).join('')}</span>
                        ` : ''}
                    </div>
                </div>
            `;
        }).join('')}

        <button onclick="clearSearch()" style="margin-top:1rem;">🔙 Annuler la recherche</button>
    `;
}

function clearSearch() {
    const main = document.getElementById('content-area');
    // Re-render current category content (use stored state)
    const activeCatId = Object.keys(state.notes).find(id => id.startsWith('bm_')) || 
                        Object.values(state.categories)[0]?.id;
    if (!activeCatId) return;

    const cat = state.categories.find(c => c.id === activeCatId);
    renderContent(cat);
}

document.addEventListener('DOMContentLoaded', () => {
    loadFromStorage();
    
    // Render sidebar
    renderSidebar();
    
    // Set up global search listener
    const searchInput = document.getElementById('global-search');
    if (searchInput) {
        searchInput.value = localStorage.getItem('grimoire_search') || '';
        searchInput.addEventListener('input', e => {
            localStorage.setItem('grimoire_search', e.target.value);
            performSearch(e.target.value.trim());
        });
        
        // Ctrl+K to focus search
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
        });
    }

    // Set up keyboard shortcuts
    document.addEventListener('keydown', e => {
        const main = document.getElementById('content-area');

            e.preventDefault();
            showShortcutsPage();

        // Ctrl+N — new note in active category

            e.preventDefault();
